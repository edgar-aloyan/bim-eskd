<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bim-eskd</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <h1>bim-eskd</h1>
    <div class="header-spacer"></div>
    <span class="page-indicator" id="page-indicator"></span>
    <button class="header-btn" id="btn-print" title="Print all (Ctrl+P)">Print</button>
    <button class="header-btn" id="btn-theme" title="Toggle theme">Theme</button>
  </div>

  <div class="main">
    <div class="sidebar">
      <div id="sidebar-content">
        <div class="loading">Loading...</div>
      </div>
    </div>

    <div class="viewer">
      <div class="viewer-scroll" id="viewer-scroll">
        <div class="empty-state">
          <p>Loading documents...</p>
        </div>
      </div>
    </div>
  </div>

  <div class="zoom-controls">
    <button class="zoom-btn" id="btn-zoom-out" title="Zoom out (Ctrl+-)">-</button>
    <span class="zoom-level" id="zoom-level">100%</span>
    <button class="zoom-btn" id="btn-zoom-in" title="Zoom in (Ctrl++)">+</button>
    <button class="zoom-btn" id="btn-zoom-fit" title="Fit width (Ctrl+0)">&#8596;</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
