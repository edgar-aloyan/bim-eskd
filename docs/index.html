<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bim-eskd</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <h1>bim-eskd</h1>
    <div class="header-spacer"></div>
    <button class="header-btn" id="btn-prev" title="Previous sheet">&#9664;</button>
    <button class="header-btn" id="btn-next" title="Next sheet">&#9654;</button>
    <button class="header-btn" id="btn-print" title="Print">Print</button>
    <button class="header-btn" id="btn-theme" title="Toggle theme">Theme</button>
  </div>

  <div class="main">
    <div class="sidebar">
      <div id="sidebar-content">
        <div class="loading">Loading...</div>
      </div>
    </div>

    <div class="viewer">
      <div class="viewer-content" id="viewer-content">
        <div class="empty-state">
          <p>Select a sheet from the sidebar</p>
        </div>
      </div>

      <div class="zoom-controls">
        <button class="zoom-btn" id="btn-zoom-out" title="Zoom out">-</button>
        <span class="zoom-level" id="zoom-level">100%</span>
        <button class="zoom-btn" id="btn-zoom-in" title="Zoom in">+</button>
        <button class="zoom-btn" id="btn-zoom-fit" title="Fit to view">&#8862;</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
