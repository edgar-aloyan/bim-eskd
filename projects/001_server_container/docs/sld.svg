<svg xmlns="http://www.w3.org/2000/svg" width="420mm" height="297mm" viewBox="0 0 420 297">
  <rect width="420" height="297" fill="white"/>

  <defs>
    <!-- Миллиметровка -->
    <pattern id="mm1" width="1" height="1" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="1" stroke="#c8d8e8" stroke-width="0.1"/>
      <line x1="0" y1="0" x2="1" y2="0" stroke="#c8d8e8" stroke-width="0.1"/>
    </pattern>
    <pattern id="mm5" width="5" height="5" patternUnits="userSpaceOnUse">
      <rect width="5" height="5" fill="url(#mm1)"/>
      <line x1="0" y1="0" x2="0" y2="5" stroke="#90b0d0" stroke-width="0.15"/>
      <line x1="0" y1="0" x2="5" y2="0" stroke="#90b0d0" stroke-width="0.15"/>
    </pattern>

    <!-- УГО: Узел (точка соединения), ГОСТ 2.721 -->
    <symbol id="ugo-node" overflow="visible">
      <circle cx="0" cy="0" r="0.7" fill="black" stroke="none"/>
    </symbol>

    <!-- УГО: Заземлитель (однополюсный), ГОСТ 2.751 -->
    <symbol id="ugo-ground" overflow="visible">
      <g stroke="black" stroke-width="0.5">
        <line x1="0" y1="0" x2="0" y2="5"/>
        <line x1="-4" y1="5" x2="4" y2="5"/>
        <line x1="-2.5" y1="7" x2="2.5" y2="7"/>
        <line x1="-1" y1="9" x2="1" y2="9"/>
      </g>
    </symbol>

    <!-- УГО: Контакт нормально разомкнутый, ГОСТ 2.755, выводы 5мм + зазор 10мм = 20мм, угол 30° -->
    <symbol id="ugo-contact" overflow="visible">
      <g stroke="black" stroke-width="0.5" fill="none">
        <line x1="0" y1="0" x2="0" y2="7"/>
        <line x1="0" y1="15" x2="-5" y2="6"/>
        <line x1="0" y1="15" x2="0" y2="20"/>
      </g>
    </symbol>

    <!-- УГО: Автоматический выключатель, ГОСТ 2.755 (п.5 табл.1 — прямоугольник на рычаге) -->
    <symbol id="ugo-breaker" overflow="visible">
      <g stroke="black" stroke-width="0.5" fill="none">
        <line x1="0" y1="0" x2="0" y2="7"/>
        <line x1="-1" y1="5" x2="1" y2="7"/>
        <line x1="-1" y1="7" x2="1" y2="5"/>
        <line x1="0" y1="15" x2="-5" y2="6"/>
        <rect x="-2" y="-1.5" width="2" height="3" fill="none" stroke="black" stroke-width="0.5" transform="translate(-2.5, 10.5) rotate(-30)"/>
        <line x1="0" y1="15" x2="0" y2="20"/>
      </g>
    </symbol>

    <!-- УГО: Обмотка генератора (двухполюсная), ГОСТ 2.723, d=10мм -->
    <symbol id="ugo-generator" overflow="visible">
      <g stroke="black" stroke-width="0.5" fill="none">
        <line x1="0" y1="0" x2="0" y2="5"/>
        <circle cx="0" cy="10" r="5"/>
        <path d="M-3,10 C-3,7.5 0,7.5 0,10 S3,12.5 3,10" stroke-width="0.3"/>
        <line x1="0" y1="15" x2="0" y2="20"/>
      </g>
    </symbol>

    <!-- УГО: Лампочка (двухполюсная), ГОСТ 2.732, d=10мм -->
    <symbol id="ugo-lamp" overflow="visible">
      <g stroke="black" stroke-width="0.5" fill="none">
        <line x1="0" y1="0" x2="0" y2="5"/>
        <circle cx="0" cy="10" r="5"/>
        <line x1="-3.5" y1="6.5" x2="3.5" y2="13.5"/>
        <line x1="3.5" y1="6.5" x2="-3.5" y2="13.5"/>
        <line x1="0" y1="15" x2="0" y2="20"/>
      </g>
    </symbol>
  </defs>

  <rect width="420" height="297" fill="url(#mm5)"/>

  <!-- Корпуса (элемент схемы, не часть УГО) -->
  <rect x="55" y="45" width="20" height="30" fill="none" stroke="black" stroke-width="0.3" stroke-dasharray="2,1"/>
  <rect x="85" y="45" width="20" height="30" fill="none" stroke="black" stroke-width="0.3" stroke-dasharray="2,1"/>

  <!-- L (фаза) — коричневый, с контактом на x=80 -->
  <g stroke="#8B4513" stroke-width="0.5">
    <line x1="65" y1="50" x2="80" y2="50"/>
    <line x1="80" y1="50" x2="80" y2="40"/>
    <line x1="80" y1="20" x2="95" y2="20"/>
    <line x1="95" y1="20" x2="95" y2="50"/>
  </g>
  <use href="#ugo-contact" x="80" y="20"/>

  <!-- N (нейтраль) — синий -->
  <g stroke="#0000CC" stroke-width="0.5">
    <line x1="65" y1="80" x2="95" y2="80"/>
    <line x1="65" y1="70" x2="65" y2="80"/>
    <line x1="95" y1="70" x2="95" y2="80"/>
  </g>

  <!-- Узел (95,80): N + ответвление заземлителя -->
  <use href="#ugo-node" x="95" y="80"/>

  <!-- PE (защитное заземление) — жёлто-зелёный пунктир -->
  <g stroke-width="0.7">
    <!-- Зелёная основа -->
    <line x1="75" y1="75" x2="85" y2="75" stroke="#228B22"/>
    <line x1="80" y1="75" x2="80" y2="85" stroke="#228B22"/>
    <!-- Жёлтый пунктир поверх -->
    <line x1="75" y1="75" x2="85" y2="75" stroke="#FFD700" stroke-dasharray="2,2"/>
    <line x1="80" y1="75" x2="80" y2="85" stroke="#FFD700" stroke-dasharray="2,2"/>
  </g>
  <!-- Узлы: PE-провод × грани корпусов + Т-соединение -->
  <use href="#ugo-node" x="75" y="75"/>
  <use href="#ugo-node" x="80" y="75"/>
  <use href="#ugo-node" x="85" y="75"/>

  <!-- Размещение УГО на схеме -->
  <use href="#ugo-generator" x="95" y="50"/>
  <use href="#ugo-lamp" x="65" y="50"/>
  <use href="#ugo-contact" x="80" y="20"/>
  <use href="#ugo-ground" x="95" y="80"/>
  <use href="#ugo-ground" x="80" y="85"/>

  <!-- Таблица УГО (перечень условных графических обозначений) -->
  <g transform="translate(50, 120)" stroke="black" stroke-width="0.3" font-family="sans-serif">
    <!-- Заголовок -->
    <text x="60" y="-3" font-size="3.5" font-weight="bold" text-anchor="middle" stroke="none" fill="black">Условные графические обозначения</text>

    <!-- Шапка таблицы -->
    <rect x="0" y="0" width="120" height="10" fill="#eee" stroke="black"/>
    <text x="20" y="7" font-size="2.8" text-anchor="middle" stroke="none" fill="black" font-weight="bold">Обозначение</text>
    <text x="70" y="7" font-size="2.8" text-anchor="middle" stroke="none" fill="black" font-weight="bold">Наименование</text>
    <text x="110" y="7" font-size="2.8" text-anchor="middle" stroke="none" fill="black" font-weight="bold">ГОСТ</text>
    <line x1="40" y1="0" x2="40" y2="10"/>
    <line x1="100" y1="0" x2="100" y2="10"/>

    <!-- Строка 1: Заземлитель (символ 9мм, строка 20мм) -->
    <rect x="0" y="10" width="120" height="20" fill="none" stroke="black"/>
    <line x1="40" y1="10" x2="40" y2="30"/>
    <line x1="100" y1="10" x2="100" y2="30"/>
    <use href="#ugo-ground" x="20" y="15"/>
    <text x="70" y="22" font-size="2.5" text-anchor="middle" stroke="none" fill="black">Заземлитель</text>
    <text x="110" y="22" font-size="2" text-anchor="middle" stroke="none" fill="black">ГОСТ 2.751</text>

    <!-- Строка 2: Контакт нормально разомкнутый (символ 20мм, строка 30мм) -->
    <rect x="0" y="30" width="120" height="30" fill="none" stroke="black"/>
    <line x1="40" y1="30" x2="40" y2="60"/>
    <line x1="100" y1="30" x2="100" y2="60"/>
    <use href="#ugo-contact" x="20" y="35"/>
    <text x="70" y="47" font-size="2.5" text-anchor="middle" stroke="none" fill="black">Контакт нормально разомкнутый</text>
    <text x="110" y="47" font-size="2" text-anchor="middle" stroke="none" fill="black">ГОСТ 2.755</text>

    <!-- Строка 3: Автоматический выключатель (символ 20мм, строка 30мм) -->
    <rect x="0" y="60" width="120" height="30" fill="none" stroke="black"/>
    <line x1="40" y1="60" x2="40" y2="90"/>
    <line x1="100" y1="60" x2="100" y2="90"/>
    <use href="#ugo-breaker" x="20" y="65"/>
    <text x="70" y="77" font-size="2.5" text-anchor="middle" stroke="none" fill="black">Автоматический выключатель</text>
    <text x="110" y="77" font-size="2" text-anchor="middle" stroke="none" fill="black">ГОСТ 2.755</text>

    <!-- Строка 4: Обмотка генератора (символ 20мм, строка 30мм) -->
    <rect x="0" y="90" width="120" height="30" fill="none" stroke="black"/>
    <line x1="40" y1="90" x2="40" y2="120"/>
    <line x1="100" y1="90" x2="100" y2="120"/>
    <use href="#ugo-generator" x="20" y="95"/>
    <text x="70" y="105" font-size="2.5" text-anchor="middle" stroke="none" fill="black">Обмотка генератора</text>
    <text x="70" y="109" font-size="2.5" text-anchor="middle" stroke="none" fill="black">однофазная</text>
    <text x="110" y="107" font-size="2" text-anchor="middle" stroke="none" fill="black">ГОСТ 2.723</text>

    <!-- Строка 5: Лампочка (символ 20мм, строка 30мм) -->
    <rect x="0" y="120" width="120" height="30" fill="none" stroke="black"/>
    <line x1="40" y1="120" x2="40" y2="150"/>
    <line x1="100" y1="120" x2="100" y2="150"/>
    <use href="#ugo-lamp" x="20" y="125"/>
    <text x="70" y="135" font-size="2.5" text-anchor="middle" stroke="none" fill="black">Лампа накаливания</text>
    <text x="70" y="139" font-size="2.5" text-anchor="middle" stroke="none" fill="black">осветительная</text>
    <text x="110" y="137" font-size="2" text-anchor="middle" stroke="none" fill="black">ГОСТ 2.732</text>

    <!-- Строка 6: Корпус (строка 20мм) -->
    <rect x="0" y="150" width="120" height="20" fill="none" stroke="black"/>
    <line x1="40" y1="150" x2="40" y2="170"/>
    <line x1="100" y1="150" x2="100" y2="170"/>
    <rect x="10" y="155" width="20" height="10" fill="none" stroke="black" stroke-dasharray="2,1"/>
    <text x="70" y="162" font-size="2.5" text-anchor="middle" stroke="none" fill="black">Корпус (оболочка)</text>
    <text x="110" y="162" font-size="2" text-anchor="middle" stroke="none" fill="black">ГОСТ 2.721</text>

    <!-- Строка 7: Узел (строка 10мм) -->
    <rect x="0" y="170" width="120" height="10" fill="none" stroke="black"/>
    <line x1="40" y1="170" x2="40" y2="180"/>
    <line x1="100" y1="170" x2="100" y2="180"/>
    <use href="#ugo-node" x="20" y="175"/>
    <text x="70" y="177" font-size="2.5" text-anchor="middle" stroke="none" fill="black">Узел (точка соединения)</text>
    <text x="110" y="177" font-size="2" text-anchor="middle" stroke="none" fill="black">ГОСТ 2.721</text>
  </g>

</svg>
