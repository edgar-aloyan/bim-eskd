<svg xmlns="http://www.w3.org/2000/svg" width="420mm" height="297mm" viewBox="0 0 420 297">
  <rect width="420" height="297" fill="white"/>

  <defs>
    <!-- Миллиметровка -->
    <pattern id="mm1" width="1" height="1" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="1" stroke="#c8d8e8" stroke-width="0.1"/>
      <line x1="0" y1="0" x2="1" y2="0" stroke="#c8d8e8" stroke-width="0.1"/>
    </pattern>
    <pattern id="mm5" width="5" height="5" patternUnits="userSpaceOnUse">
      <rect width="5" height="5" fill="url(#mm1)"/>
      <line x1="0" y1="0" x2="0" y2="5" stroke="#90b0d0" stroke-width="0.15"/>
      <line x1="0" y1="0" x2="5" y2="0" stroke="#90b0d0" stroke-width="0.15"/>
    </pattern>

    <!-- УГО: Узел (точка соединения), ГОСТ 2.721 -->
    <symbol id="ugo-node" overflow="visible">
      <rect x="-5" y="-5" width="10" height="10" fill="none" stroke="red" stroke-width="0.15" stroke-dasharray="1,1" opacity="0.5"/>
      <circle cx="0" cy="0" r="0.7" fill="black" stroke="none"/>
    </symbol>

    <!-- УГО: Заземлитель (однополюсный), ГОСТ 2.751 -->
    <symbol id="ugo-ground" overflow="visible">
      <rect x="-5" y="0" width="10" height="10" fill="none" stroke="red" stroke-width="0.15" stroke-dasharray="1,1" opacity="0.5"/>
      <g stroke="black" stroke-width="0.5">
        <line x1="0" y1="0" x2="0" y2="5"/>
        <line x1="-4" y1="5" x2="4" y2="5"/>
        <line x1="-2.5" y1="7" x2="2.5" y2="7"/>
        <line x1="-1" y1="9" x2="1" y2="9"/>
      </g>
    </symbol>

    <!-- УГО: Контакт нормально разомкнутый, ГОСТ 2.755, выводы 5мм + зазор 10мм = 20мм, угол 30° -->
    <symbol id="ugo-contact" overflow="visible">
      <rect x="-5" y="0" width="5" height="20" fill="none" stroke="red" stroke-width="0.15" stroke-dasharray="1,1" opacity="0.5"/>
      <g stroke="black" stroke-width="0.5" fill="none">
        <line x1="0" y1="0" x2="0" y2="8"/>
        <line x1="0" y1="15" x2="-5" y2="6"/>
        <line x1="0" y1="15" x2="0" y2="20"/>
      </g>
    </symbol>

    <!-- УГО: Автоматический выключатель, ГОСТ 2.755 (п.5 табл.1 — прямоугольник на рычаге) -->
    <symbol id="ugo-breaker" overflow="visible">
      <rect x="-5" y="0" width="5" height="20" fill="none" stroke="red" stroke-width="0.15" stroke-dasharray="1,1" opacity="0.5"/>
      <g stroke="black" stroke-width="0.5" fill="none">
        <line x1="0" y1="0" x2="0" y2="7"/>
        <line x1="-1" y1="6" x2="1" y2="8"/>
        <line x1="-1" y1="8" x2="1" y2="6"/>
        <line x1="0" y1="15" x2="-5" y2="6"/>
        <rect x="-2" y="-1.5" width="2" height="3" fill="none" stroke="black" stroke-width="0.5" transform="translate(-2.5, 10.5) rotate(-30)"/>
        <line x1="0" y1="15" x2="0" y2="20"/>
      </g>
    </symbol>

    <!-- УГО: Обмотка генератора (двухполюсная), ГОСТ 2.723, d=10мм -->
    <symbol id="ugo-generator" overflow="visible">
      <rect x="-5" y="0" width="10" height="20" fill="none" stroke="red" stroke-width="0.15" stroke-dasharray="1,1" opacity="0.5"/>
      <g stroke="black" stroke-width="0.5" fill="none">
        <line x1="0" y1="0" x2="0" y2="5"/>
        <circle cx="0" cy="10" r="5"/>
        <path d="M-3,10 C-3,7.5 0,7.5 0,10 S3,12.5 3,10" stroke-width="0.3"/>
        <line x1="0" y1="15" x2="0" y2="20"/>
      </g>
    </symbol>

    <!-- УГО: Лампочка (двухполюсная), ГОСТ 2.732, d=10мм -->
    <symbol id="ugo-lamp" overflow="visible">
      <rect x="-5" y="0" width="10" height="20" fill="none" stroke="red" stroke-width="0.15" stroke-dasharray="1,1" opacity="0.5"/>
      <g stroke="black" stroke-width="0.5" fill="none">
        <line x1="0" y1="0" x2="0" y2="5"/>
        <circle cx="0" cy="10" r="5"/>
        <line x1="-3.5" y1="6.5" x2="3.5" y2="13.5"/>
        <line x1="3.5" y1="6.5" x2="-3.5" y2="13.5"/>
        <line x1="0" y1="15" x2="0" y2="20"/>
      </g>
    </symbol>

    <!-- УГО: Муфта (кабельный разветвитель), 10×5мм -->
    <symbol id="ugo-mufta" overflow="visible">
      <rect x="-5" y="0" width="10" height="5" fill="none" stroke="red" stroke-width="0.15" stroke-dasharray="1,1" opacity="0.5"/>
      <polygon points="-3,0 3,0 0,5" stroke="black" stroke-width="0.5" fill="none"/>
    </symbol>
  </defs>

  <rect width="420" height="297" fill="url(#mm5)"/>

  <!-- Питающие проводники (горизонтальные) -->
  <line x1="25" y1="15" x2="270" y2="15" stroke="#8B4513" stroke-width="0.5"/>
  <line x1="25" y1="20" x2="270" y2="20" stroke="#0000CC" stroke-width="0.5"/>
  <g stroke-width="0.7">
    <line x1="25" y1="25" x2="270" y2="25" stroke="#228B22"/>
    <line x1="25" y1="25" x2="270" y2="25" stroke="#FFD700" stroke-dasharray="2,2"/>
  </g>

  <!-- Корпуса (элемент схемы, не часть УГО) -->
  <rect x="50" y="220" width="25" height="45" fill="none" stroke="black" stroke-width="0.3" stroke-dasharray="2,1"/>
  <rect x="105" y="60" width="20" height="30" fill="none" stroke="black" stroke-width="0.3" stroke-dasharray="2,1"/>

  <!-- L (фаза) — коричневый -->
  <g stroke="#8B4513" stroke-width="0.5">
    <!-- АВ от L шины -->
    <line x1="65" y1="15" x2="65" y2="35"/>
    <!-- Генератор от L шины -->
    <line x1="115" y1="15" x2="115" y2="65"/>
    <!-- АВ → контакт: между VB'ами -->
    <line x1="65" y1="55" x2="65" y2="60"/>
    <!-- Контакт → муфта: прямо вниз по оси кабеля -->
    <line x1="65" y1="80" x2="65" y2="95"/>
    <!-- Нижняя муфта → лампа -->
    <line x1="65" y1="225" x2="65" y2="235"/>
  </g>
  <use href="#ugo-breaker" x="65" y="35"/>
  <use href="#ugo-contact" x="65" y="60"/>

  <!-- Муфта верхняя (провод → кабель) -->
  <use href="#ugo-mufta" x="65" y="95"/>
  <!-- Кабель (чёрный) -->
  <line x1="65" y1="100" x2="65" y2="220" stroke="black" stroke-width="0.5"/>
  <!-- Муфта нижняя (кабель → провод), перевёрнута -->
  <g transform="translate(65, 225) scale(1, -1)">
    <use href="#ugo-mufta"/>
  </g>

  <!-- N (нейтраль) — синий -->
  <g stroke="#0000CC" stroke-width="0.5">
    <!-- Сверху: N шина → вниз → диагональ 1:2 в верхнюю муфту -->
    <line x1="70" y1="20" x2="70" y2="85"/>
    <line x1="70" y1="85" x2="65" y2="95"/>
    <!-- Снизу: нижняя муфта → диагональ → внутри корпуса → лампа -->
    <line x1="65" y1="225" x2="55" y2="235"/>
    <line x1="55" y1="235" x2="55" y2="260"/>
    <line x1="55" y1="260" x2="65" y2="260"/>
    <line x1="65" y1="260" x2="65" y2="255"/>
  </g>

  <!-- PEN (от генератора до узла N) — жёлто-зелёно-синий, 2мм каждый цвет -->
  <g stroke-width="0.7">
    <line x1="115" y1="85" x2="115" y2="120" stroke="#228B22" stroke-dasharray="2,4" stroke-dashoffset="0"/>
    <line x1="115" y1="85" x2="115" y2="120" stroke="#FFD700" stroke-dasharray="2,4" stroke-dashoffset="4"/>
    <line x1="115" y1="85" x2="115" y2="120" stroke="#0000CC" stroke-dasharray="2,4" stroke-dashoffset="2"/>
  </g>

  <!-- Узел (115,120): PEN сверху + N влево + PE снизу -->
  <use href="#ugo-node" x="115" y="120"/>


  <!-- PE (защитное заземление) — жёлто-зелёный -->
  <g stroke-width="0.7">
    <!-- Зелёная основа -->
    <!-- Сверху: муфта → диагональ 1:1 (45°) → вверх к PE шине -->
    <line x1="65" y1="95" x2="75" y2="85" stroke="#228B22"/>
    <line x1="75" y1="85" x2="75" y2="25" stroke="#228B22"/>
    <line x1="105" y1="90" x2="105" y2="25" stroke="#228B22"/>
    <!-- Снизу: муфта → диагональ 1:1 → правая стенка корпуса -->
    <line x1="65" y1="225" x2="75" y2="235" stroke="#228B22"/>
    <!-- Жёлтый пунктир поверх -->
    <line x1="65" y1="95" x2="75" y2="85" stroke="#FFD700" stroke-dasharray="2,2"/>
    <line x1="75" y1="85" x2="75" y2="25" stroke="#FFD700" stroke-dasharray="2,2"/>
    <line x1="105" y1="90" x2="105" y2="25" stroke="#FFD700" stroke-dasharray="2,2"/>
    <line x1="65" y1="225" x2="75" y2="235" stroke="#FFD700" stroke-dasharray="2,2"/>
  </g>
  <!-- Узлы PE: T на PE шине (75,25), T на корпусе лампы (75,235), T на корпусе генератора (105,90 → шина 105,25) -->
  <use href="#ugo-node" x="75" y="235"/>
  <use href="#ugo-node" x="75" y="25"/>
  <use href="#ugo-node" x="105" y="90"/>
  <use href="#ugo-node" x="105" y="25"/>

  <!-- Узлы на L шине -->
  <use href="#ugo-node" x="65" y="15"/>
  <use href="#ugo-node" x="115" y="15"/>
  <!-- Узел на N шине -->
  <use href="#ugo-node" x="70" y="20"/>

  <!-- Размещение УГО на схеме -->
  <use href="#ugo-generator" x="115" y="65"/>
  <use href="#ugo-lamp" x="65" y="235"/>
  <use href="#ugo-ground" x="270" y="25"/>

  <!-- Таблица УГО (перечень условных графических обозначений) -->
  <g transform="translate(295, 20)" stroke="black" stroke-width="0.3" font-family="sans-serif">
    <!-- Заголовок -->
    <text x="60" y="-3" font-size="3.5" font-weight="bold" text-anchor="middle" stroke="none" fill="black">Условные графические обозначения</text>

    <!-- Шапка таблицы -->
    <rect x="0" y="0" width="120" height="10" fill="#eee" stroke="black"/>
    <text x="20" y="7" font-size="2.8" text-anchor="middle" stroke="none" fill="black" font-weight="bold">Обозначение</text>
    <text x="70" y="7" font-size="2.8" text-anchor="middle" stroke="none" fill="black" font-weight="bold">Наименование</text>
    <text x="110" y="7" font-size="2.8" text-anchor="middle" stroke="none" fill="black" font-weight="bold">ГОСТ</text>
    <line x1="40" y1="0" x2="40" y2="10"/>
    <line x1="100" y1="0" x2="100" y2="10"/>

    <!-- Строка 1: Заземлитель (символ 9мм, строка 20мм) -->
    <rect x="0" y="10" width="120" height="20" fill="none" stroke="black"/>
    <line x1="40" y1="10" x2="40" y2="30"/>
    <line x1="100" y1="10" x2="100" y2="30"/>
    <use href="#ugo-ground" x="20" y="15"/>
    <text x="70" y="22" font-size="2.5" text-anchor="middle" stroke="none" fill="black">Заземлитель</text>
    <text x="110" y="22" font-size="2" text-anchor="middle" stroke="none" fill="black">ГОСТ 2.751</text>

    <!-- Строка 2: Контакт нормально разомкнутый (символ 20мм, строка 30мм) -->
    <rect x="0" y="30" width="120" height="30" fill="none" stroke="black"/>
    <line x1="40" y1="30" x2="40" y2="60"/>
    <line x1="100" y1="30" x2="100" y2="60"/>
    <use href="#ugo-contact" x="20" y="35"/>
    <text x="70" y="47" font-size="2.5" text-anchor="middle" stroke="none" fill="black">Контакт нормально разомкнутый</text>
    <text x="110" y="47" font-size="2" text-anchor="middle" stroke="none" fill="black">ГОСТ 2.755</text>

    <!-- Строка 3: Автоматический выключатель (символ 20мм, строка 30мм) -->
    <rect x="0" y="60" width="120" height="30" fill="none" stroke="black"/>
    <line x1="40" y1="60" x2="40" y2="90"/>
    <line x1="100" y1="60" x2="100" y2="90"/>
    <use href="#ugo-breaker" x="20" y="65"/>
    <text x="70" y="77" font-size="2.5" text-anchor="middle" stroke="none" fill="black">Автоматический выключатель</text>
    <text x="110" y="77" font-size="2" text-anchor="middle" stroke="none" fill="black">ГОСТ 2.755</text>

    <!-- Строка 4: Обмотка генератора (символ 20мм, строка 30мм) -->
    <rect x="0" y="90" width="120" height="30" fill="none" stroke="black"/>
    <line x1="40" y1="90" x2="40" y2="120"/>
    <line x1="100" y1="90" x2="100" y2="120"/>
    <use href="#ugo-generator" x="20" y="95"/>
    <text x="70" y="105" font-size="2.5" text-anchor="middle" stroke="none" fill="black">Обмотка генератора</text>
    <text x="70" y="109" font-size="2.5" text-anchor="middle" stroke="none" fill="black">однофазная</text>
    <text x="110" y="107" font-size="2" text-anchor="middle" stroke="none" fill="black">ГОСТ 2.723</text>

    <!-- Строка 5: Лампочка (символ 20мм, строка 30мм) -->
    <rect x="0" y="120" width="120" height="30" fill="none" stroke="black"/>
    <line x1="40" y1="120" x2="40" y2="150"/>
    <line x1="100" y1="120" x2="100" y2="150"/>
    <use href="#ugo-lamp" x="20" y="125"/>
    <text x="70" y="135" font-size="2.5" text-anchor="middle" stroke="none" fill="black">Лампа накаливания</text>
    <text x="70" y="139" font-size="2.5" text-anchor="middle" stroke="none" fill="black">осветительная</text>
    <text x="110" y="137" font-size="2" text-anchor="middle" stroke="none" fill="black">ГОСТ 2.732</text>

    <!-- Строка 6: Корпус (строка 20мм) -->
    <rect x="0" y="150" width="120" height="20" fill="none" stroke="black"/>
    <line x1="40" y1="150" x2="40" y2="170"/>
    <line x1="100" y1="150" x2="100" y2="170"/>
    <rect x="10" y="155" width="20" height="10" fill="none" stroke="black" stroke-dasharray="2,1"/>
    <text x="70" y="162" font-size="2.5" text-anchor="middle" stroke="none" fill="black">Корпус (оболочка)</text>
    <text x="110" y="162" font-size="2" text-anchor="middle" stroke="none" fill="black">ГОСТ 2.721</text>

    <!-- Строка 7: Муфта (строка 15мм) -->
    <rect x="0" y="170" width="120" height="15" fill="none" stroke="black"/>
    <line x1="40" y1="170" x2="40" y2="185"/>
    <line x1="100" y1="170" x2="100" y2="185"/>
    <use href="#ugo-mufta" x="20" y="175"/>
    <text x="70" y="180" font-size="2.5" text-anchor="middle" stroke="none" fill="black">Муфта (кабельный разветвитель)</text>
    <text x="110" y="180" font-size="2" text-anchor="middle" stroke="none" fill="black">—</text>

    <!-- Строка 8: Узел (строка 20мм) -->
    <rect x="0" y="185" width="120" height="20" fill="none" stroke="black"/>
    <line x1="40" y1="185" x2="40" y2="205"/>
    <line x1="100" y1="185" x2="100" y2="205"/>
    <use href="#ugo-node" x="20" y="195"/>
    <text x="70" y="197" font-size="2.5" text-anchor="middle" stroke="none" fill="black">Узел (точка соединения)</text>
    <text x="110" y="197" font-size="2" text-anchor="middle" stroke="none" fill="black">ГОСТ 2.721</text>

    <!-- Строка 9: Кабель (строка 10мм) -->
    <rect x="0" y="205" width="120" height="10" fill="none" stroke="black"/>
    <line x1="40" y1="205" x2="40" y2="215"/>
    <line x1="100" y1="205" x2="100" y2="215"/>
    <line x1="10" y1="210" x2="30" y2="210" stroke="black" stroke-width="0.5"/>
    <text x="70" y="212" font-size="2.5" text-anchor="middle" stroke="none" fill="black">Кабель</text>
    <text x="110" y="212" font-size="2" text-anchor="middle" stroke="none" fill="black">ГОСТ Р 50462</text>

    <!-- Строка 10: L проводник (строка 10мм) -->
    <rect x="0" y="215" width="120" height="10" fill="none" stroke="black"/>
    <line x1="40" y1="215" x2="40" y2="225"/>
    <line x1="100" y1="215" x2="100" y2="225"/>
    <line x1="10" y1="220" x2="30" y2="220" stroke="#8B4513" stroke-width="0.5"/>
    <text x="70" y="222" font-size="2.5" text-anchor="middle" stroke="none" fill="black">L — фазный проводник</text>
    <text x="110" y="222" font-size="2" text-anchor="middle" stroke="none" fill="black">ГОСТ Р 50462</text>

    <!-- Строка 11: N проводник (строка 10мм) -->
    <rect x="0" y="225" width="120" height="10" fill="none" stroke="black"/>
    <line x1="40" y1="225" x2="40" y2="235"/>
    <line x1="100" y1="225" x2="100" y2="235"/>
    <line x1="10" y1="230" x2="30" y2="230" stroke="#0000CC" stroke-width="0.5"/>
    <text x="70" y="232" font-size="2.5" text-anchor="middle" stroke="none" fill="black">N — нейтральный проводник</text>
    <text x="110" y="232" font-size="2" text-anchor="middle" stroke="none" fill="black">ГОСТ Р 50462</text>

    <!-- Строка 12: PE проводник (строка 10мм) -->
    <rect x="0" y="235" width="120" height="10" fill="none" stroke="black"/>
    <line x1="40" y1="235" x2="40" y2="245"/>
    <line x1="100" y1="235" x2="100" y2="245"/>
    <line x1="10" y1="240" x2="30" y2="240" stroke="#228B22" stroke-width="0.7"/>
    <line x1="10" y1="240" x2="30" y2="240" stroke="#FFD700" stroke-width="0.7" stroke-dasharray="2,2"/>
    <text x="70" y="242" font-size="2.5" text-anchor="middle" stroke="none" fill="black">PE — защитный проводник</text>
    <text x="110" y="242" font-size="2" text-anchor="middle" stroke="none" fill="black">ГОСТ Р 50462</text>

    <!-- Строка 13: PEN проводник (строка 10мм) -->
    <rect x="0" y="245" width="120" height="10" fill="none" stroke="black"/>
    <line x1="40" y1="245" x2="40" y2="255"/>
    <line x1="100" y1="245" x2="100" y2="255"/>
    <line x1="10" y1="250" x2="30" y2="250" stroke="#228B22" stroke-width="0.7" stroke-dasharray="2,4" stroke-dashoffset="0"/>
    <line x1="10" y1="250" x2="30" y2="250" stroke="#FFD700" stroke-width="0.7" stroke-dasharray="2,4" stroke-dashoffset="4"/>
    <line x1="10" y1="250" x2="30" y2="250" stroke="#0000CC" stroke-width="0.7" stroke-dasharray="2,4" stroke-dashoffset="2"/>
    <text x="70" y="252" font-size="2.5" text-anchor="middle" stroke="none" fill="black">PEN — совмещённый проводник</text>
    <text x="110" y="252" font-size="2" text-anchor="middle" stroke="none" fill="black">ГОСТ Р 50462</text>
  </g>

</svg>
