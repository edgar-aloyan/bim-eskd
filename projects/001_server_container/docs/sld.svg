<svg xmlns="http://www.w3.org/2000/svg" width="420mm" height="297mm" viewBox="0 0 420 297">
  <rect width="420" height="297" fill="white"/>

  <!-- Миллиметровка -->
  <defs>
    <pattern id="mm1" width="1" height="1" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="1" stroke="#c8d8e8" stroke-width="0.1"/>
      <line x1="0" y1="0" x2="1" y2="0" stroke="#c8d8e8" stroke-width="0.1"/>
    </pattern>
    <pattern id="mm5" width="5" height="5" patternUnits="userSpaceOnUse">
      <rect width="5" height="5" fill="url(#mm1)"/>
      <line x1="0" y1="0" x2="0" y2="5" stroke="#90b0d0" stroke-width="0.15"/>
      <line x1="0" y1="0" x2="5" y2="0" stroke="#90b0d0" stroke-width="0.15"/>
    </pattern>
  </defs>
  <rect width="420" height="297" fill="url(#mm5)"/>

  <!-- Заземлитель на нижнем полюсе генератора -->
  <g transform="translate(95, 80)" stroke="black" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="5"/>
    <line x1="-4" y1="5" x2="4" y2="5"/>
    <line x1="-2.5" y1="7" x2="2.5" y2="7"/>
    <line x1="-1" y1="9" x2="1" y2="9"/>
  </g>

  <!-- Провода (замкнутая цепь: генератор — лампочка) -->
  <g stroke="black" stroke-width="0.5">
    <line x1="65" y1="50" x2="95" y2="50"/>
    <line x1="65" y1="80" x2="95" y2="80"/>
  </g>

  <!-- Точка на пересечении (95,80): провод + ответвление заземлителя -->
  <circle cx="95" cy="80" r="0.7" fill="black" stroke="none"/>

  <!-- Обмотка генератора (двухполюсная), ГОСТ 2.723, d=10мм, выводы 5мм -->
  <g transform="translate(95, 50)" stroke="black" stroke-width="0.5" fill="none">
    <line x1="0" y1="0" x2="0" y2="5"/>
    <rect x="-10" y="5" width="20" height="20" stroke-dasharray="2,1" stroke-width="0.3"/>
    <circle cx="0" cy="15" r="5"/>
    <path d="M-3,15 C-3,12.5 0,12.5 0,15 S3,17.5 3,15" stroke-width="0.3"/>
    <line x1="0" y1="25" x2="0" y2="30"/>
  </g>

  <!-- Лампочка (двухполюсная), ГОСТ 2.732, d=10мм, выводы 5мм -->
  <g transform="translate(65, 50)" stroke="black" stroke-width="0.5" fill="none">
    <line x1="0" y1="0" x2="0" y2="5"/>
    <rect x="-10" y="5" width="20" height="20" stroke-dasharray="2,1" stroke-width="0.3"/>
    <circle cx="0" cy="15" r="5"/>
    <line x1="-3.5" y1="11.5" x2="3.5" y2="18.5"/>
    <line x1="3.5" y1="11.5" x2="-3.5" y2="18.5"/>
    <line x1="0" y1="25" x2="0" y2="30"/>
  </g>

</svg>
