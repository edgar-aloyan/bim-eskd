<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="380mm" height="220mm" viewBox="0 0 380 220">

  <!-- ═══════════════════════════════════════════ -->
  <!-- DEFS: reusable ГОСТ symbol templates        -->
  <!-- ═══════════════════════════════════════════ -->
  <defs>
    <!-- Автоматический выключатель (ГОСТ 2.755-87) -->
    <g id="sym-qf">
      <circle cx="5" cy="1" r="0.8" fill="black" stroke="none"/>
      <line x1="5" y1="11" x2="3" y2="1" stroke="black" stroke-width="0.7"/>
      <rect x="3" y="5" width="3" height="2" fill="none" stroke="black" stroke-width="0.5"/>
      <circle cx="5" cy="11" r="0.8" fill="black" stroke="none"/>
      <line x1="5" y1="0" x2="5" y2="1" stroke="black" stroke-width="0.5"/>
      <line x1="5" y1="11" x2="5" y2="14" stroke="black" stroke-width="0.5"/>
    </g>

    <!-- Трансформатор 2-обмоточный (ГОСТ 2.723-68) -->
    <g id="sym-transformer-2w">
      <circle cx="6" cy="5" r="4" fill="none" stroke="black" stroke-width="0.5"/>
      <circle cx="6" cy="12" r="4" fill="none" stroke="black" stroke-width="0.5"/>
      <line x1="6" y1="0" x2="6" y2="1" stroke="black" stroke-width="0.5"/>
      <line x1="6" y1="16" x2="6" y2="18" stroke="black" stroke-width="0.5"/>
    </g>

    <!-- ОПН / Разрядник (ГОСТ 2.727.2) -->
    <g id="sym-opn">
      <line x1="6" y1="0" x2="6" y2="2" stroke="black" stroke-width="0.5"/>
      <polyline points="6,2 9,4 3,6 9,8 3,10 6,12"
                fill="none" stroke="black" stroke-width="0.5"/>
      <line x1="6" y1="12" x2="6" y2="14" stroke="black" stroke-width="0.5"/>
      <line x1="1" y1="14" x2="11" y2="14" stroke="black" stroke-width="0.5"/>
      <line x1="2.5" y1="15.5" x2="9.5" y2="15.5" stroke="black" stroke-width="0.5"/>
      <line x1="4" y1="17" x2="8" y2="17" stroke="black" stroke-width="0.5"/>
    </g>

    <!-- Заземление (ГОСТ 2.751-73) -->
    <g id="sym-ground">
      <line x1="6" y1="0" x2="6" y2="2" stroke="black" stroke-width="0.5"/>
      <line x1="1" y1="2" x2="11" y2="2" stroke="black" stroke-width="0.5"/>
      <line x1="2.5" y1="4" x2="9.5" y2="4" stroke="black" stroke-width="0.5"/>
      <line x1="4" y1="6" x2="8" y2="6" stroke="black" stroke-width="0.5"/>
    </g>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="380" height="220" fill="white"/>

  <!-- Title -->
  <text x="190" y="7" font-family="sans-serif" font-size="5" font-weight="bold" text-anchor="middle" fill="black">Однолинейная схема электроснабжения</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ВВОД ОТ ПОДСТАНЦИИ (обозначение, без QF)   -->
  <!-- ═══════════════════════════════════════════ -->
  <!-- Source bus (external) -->
  <line x1="138" y1="14" x2="162" y2="14" stroke="black" stroke-width="1.2"/>
  <line x1="150" y1="14" x2="150" y2="25" stroke="black" stroke-width="0.5"/>
  <!-- Labels -->
  <text x="165" y="14" font-family="sans-serif" font-size="4" fill="black">Ввод от подстанции</text>
  <text x="165" y="18.5" font-family="sans-serif" font-size="3" fill="#444">JUPITER-9000K-H1, 35/0.8кВ, 9000кВА</text>
  <text x="165" y="22.5" font-family="sans-serif" font-size="3" fill="#444">2× QF-630А (на стороне подстанции)</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- Cable 0.8kV (in ground)                    -->
  <!-- ═══════════════════════════════════════════ -->
  <line x1="150" y1="25" x2="150" y2="30" stroke="black" stroke-width="0.5"/>
  <line x1="150" y1="30" x2="150" y2="72" stroke="black" stroke-width="0.5" stroke-dasharray="3,1.5"/>
  <text x="157" y="48" font-family="sans-serif" font-size="3.5" fill="black">Кабель 0.8кВ</text>
  <text x="157" y="52" font-family="sans-serif" font-size="3" fill="#444">(в земле)</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- Container boundary                         -->
  <!-- ═══════════════════════════════════════════ -->
  <line x1="150" y1="72" x2="150" y2="77" stroke="black" stroke-width="0.5"/>
  <line x1="30" y1="77" x2="350" y2="77" stroke="black" stroke-width="0.4" stroke-dasharray="8,2,1.5,2"/>
  <text x="32" y="75" font-family="sans-serif" font-size="3" fill="#666">Граница контейнера</text>
  <line x1="150" y1="77" x2="150" y2="78" stroke="black" stroke-width="0.5"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- QF-400A — автоматический выключатель        -->
  <!-- ГОСТ 2.755-87 via <use>                    -->
  <!-- ═══════════════════════════════════════════ -->
  <use href="#sym-qf" x="145" y="78"/>
  <!-- Labels -->
  <text x="157" y="84" font-family="sans-serif" font-size="4" fill="black">QF-400А</text>
  <text x="157" y="88.5" font-family="sans-serif" font-size="3" fill="#444">400А, вводной</text>

  <!-- Wire from QF bottom to OPN junction -->
  <line x1="150" y1="92" x2="150" y2="95" stroke="black" stroke-width="0.5"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- OPN branch (surge arresters) via <use>     -->
  <!-- ═══════════════════════════════════════════ -->
  <!-- T-junction dot -->
  <circle cx="150" cy="95" r="1.2" fill="black" stroke="none"/>
  <!-- Horizontal branch to OPN -->
  <line x1="150" y1="95" x2="199" y2="95" stroke="black" stroke-width="0.5"/>
  <use href="#sym-opn" x="199" y="95"/>
  <!-- Labels -->
  <text x="213" y="100" font-family="sans-serif" font-size="3.5" fill="black">ОПН 3× ОПНп-0.66</text>
  <text x="213" y="104" font-family="sans-serif" font-size="3" fill="#444">Uнр = 0.66кВ</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- Main trunk continues down to busbar        -->
  <!-- ═══════════════════════════════════════════ -->
  <line x1="150" y1="95" x2="150" y2="102" stroke="black" stroke-width="0.5"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- MAIN BUSBAR L1-L2-L3-PE(=N), 800V, 400A   -->
  <!-- ═══════════════════════════════════════════ -->
  <line x1="45" y1="102" x2="315" y2="102" stroke="black" stroke-width="2"/>
  <!-- Phase labels above busbar -->
  <text x="80" y="100" font-family="sans-serif" font-size="3.5" font-weight="bold" text-anchor="middle" fill="black">L1</text>
  <text x="130" y="100" font-family="sans-serif" font-size="3.5" font-weight="bold" text-anchor="middle" fill="black">L2</text>
  <text x="180" y="100" font-family="sans-serif" font-size="3.5" font-weight="bold" text-anchor="middle" fill="black">L3</text>
  <text x="240" y="100" font-family="sans-serif" font-size="3.5" font-weight="bold" text-anchor="middle" fill="black">PE(=N)</text>
  <!-- Bus parameters -->
  <text x="318" y="101" font-family="sans-serif" font-size="3" fill="black">~800В, 400А</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- LEFT BRANCH: TRS-160 → sec bus → load      -->
  <!-- ═══════════════════════════════════════════ -->
  <line x1="80" y1="102" x2="80" y2="108" stroke="black" stroke-width="0.5"/>
  <!-- TRS-160 transformer via <use> -->
  <use href="#sym-transformer-2w" x="74" y="108"/>
  <!-- Labels -->
  <text x="88" y="114" font-family="sans-serif" font-size="4" fill="black">ТРС-160</text>
  <text x="88" y="118.5" font-family="sans-serif" font-size="3" fill="#444">0.8/0.4кВ, 160кВА</text>
  <text x="88" y="123" font-family="sans-serif" font-size="3" fill="#444">YYn</text>

  <!-- Wire from transformer to secondary busbar -->
  <line x1="80" y1="126" x2="80" y2="138" stroke="black" stroke-width="0.5"/>

  <!-- Secondary busbar L1'-L2'-L3' -->
  <line x1="35" y1="138" x2="125" y2="138" stroke="black" stroke-width="1.5"/>
  <text x="45" y="136" font-family="sans-serif" font-size="3" font-weight="bold" fill="black">L1'</text>
  <text x="75" y="136" font-family="sans-serif" font-size="3" font-weight="bold" fill="black">L2'</text>
  <text x="105" y="136" font-family="sans-serif" font-size="3" font-weight="bold" fill="black">L3'</text>
  <text x="128" y="137" font-family="sans-serif" font-size="3" fill="#444">400В, 200А</text>

  <!-- Left load group -->
  <line x1="80" y1="138" x2="80" y2="146" stroke="black" stroke-width="0.5"/>
  <rect x="50" y="146" width="60" height="24" fill="#f5f5f5" stroke="black" stroke-width="0.5"/>
  <text x="80" y="153" font-family="sans-serif" font-size="4" font-weight="bold" text-anchor="middle" fill="black">Левая группа</text>
  <text x="80" y="157.5" font-family="sans-serif" font-size="3" text-anchor="middle" fill="black">120× Antminer S21 XP</text>
  <text x="80" y="162" font-family="sans-serif" font-size="3" text-anchor="middle" fill="#444">L—L' 230В, 3645Вт/шт</text>
  <text x="80" y="167" font-family="sans-serif" font-size="3.5" font-weight="bold" text-anchor="middle" fill="black">Pн = 437 кВт</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- RIGHT BRANCH: direct load from main bus     -->
  <!-- ═══════════════════════════════════════════ -->
  <line x1="260" y1="102" x2="260" y2="112" stroke="black" stroke-width="0.5"/>
  <rect x="230" y="112" width="60" height="24" fill="#f5f5f5" stroke="black" stroke-width="0.5"/>
  <text x="260" y="119" font-family="sans-serif" font-size="4" font-weight="bold" text-anchor="middle" fill="black">Правая группа</text>
  <text x="260" y="123.5" font-family="sans-serif" font-size="3" text-anchor="middle" fill="black">120× Antminer S21 XP</text>
  <text x="260" y="128" font-family="sans-serif" font-size="3" text-anchor="middle" fill="#444">N—L 230В, 3645Вт/шт</text>
  <text x="260" y="133" font-family="sans-serif" font-size="3.5" font-weight="bold" text-anchor="middle" fill="black">Pн = 437 кВт</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- PARAMETER TABLE                             -->
  <!-- ═══════════════════════════════════════════ -->
  <g id="param-table">
    <!-- Table border -->
    <rect x="35" y="185" width="310" height="30" fill="none" stroke="black" stroke-width="0.5"/>
    <!-- Row lines -->
    <line x1="35" y1="191" x2="345" y2="191" stroke="black" stroke-width="0.25"/>
    <line x1="35" y1="197" x2="345" y2="197" stroke="black" stroke-width="0.25"/>
    <line x1="35" y1="203" x2="345" y2="203" stroke="black" stroke-width="0.25"/>
    <line x1="35" y1="209" x2="345" y2="209" stroke="black" stroke-width="0.25"/>
    <!-- Column lines -->
    <line x1="95" y1="185" x2="95" y2="215" stroke="black" stroke-width="0.25"/>
    <line x1="160" y1="185" x2="160" y2="215" stroke="black" stroke-width="0.25"/>
    <line x1="225" y1="185" x2="225" y2="215" stroke="black" stroke-width="0.25"/>
    <line x1="290" y1="185" x2="290" y2="215" stroke="black" stroke-width="0.25"/>

    <!-- Header row -->
    <rect x="35" y="185" width="310" height="6" fill="#f0f0f0" stroke="none"/>
    <text x="65" y="189.5" font-family="sans-serif" font-size="2.8" font-weight="bold" text-anchor="middle" fill="black">Параметр</text>
    <text x="127.5" y="189.5" font-family="sans-serif" font-size="2.8" font-weight="bold" text-anchor="middle" fill="black">Ввод</text>
    <text x="192.5" y="189.5" font-family="sans-serif" font-size="2.8" font-weight="bold" text-anchor="middle" fill="black">Главная шина</text>
    <text x="257.5" y="189.5" font-family="sans-serif" font-size="2.8" font-weight="bold" text-anchor="middle" fill="black">Левая группа</text>
    <text x="317.5" y="189.5" font-family="sans-serif" font-size="2.8" font-weight="bold" text-anchor="middle" fill="black">Правая группа</text>

    <!-- Row 1: Напряжение -->
    <text x="65" y="195" font-family="sans-serif" font-size="2.8" text-anchor="middle" fill="black">Напряжение</text>
    <text x="127.5" y="195" font-family="sans-serif" font-size="2.8" text-anchor="middle" fill="black">35/0.8 кВ</text>
    <text x="192.5" y="195" font-family="sans-serif" font-size="2.8" text-anchor="middle" fill="black">0.8 кВ (800В)</text>
    <text x="257.5" y="195" font-family="sans-serif" font-size="2.8" text-anchor="middle" fill="black">0.4 кВ (400В)</text>
    <text x="317.5" y="195" font-family="sans-serif" font-size="2.8" text-anchor="middle" fill="black">0.8 кВ (800В)</text>

    <!-- Row 2: Ток -->
    <text x="65" y="201" font-family="sans-serif" font-size="2.8" text-anchor="middle" fill="black">Ток ном.</text>
    <text x="127.5" y="201" font-family="sans-serif" font-size="2.8" text-anchor="middle" fill="black">630А</text>
    <text x="192.5" y="201" font-family="sans-serif" font-size="2.8" text-anchor="middle" fill="black">400А</text>
    <text x="257.5" y="201" font-family="sans-serif" font-size="2.8" text-anchor="middle" fill="black">200А</text>
    <text x="317.5" y="201" font-family="sans-serif" font-size="2.8" text-anchor="middle" fill="black">~547А</text>

    <!-- Row 3: Мощность -->
    <text x="65" y="207" font-family="sans-serif" font-size="2.8" text-anchor="middle" fill="black">Мощность</text>
    <text x="127.5" y="207" font-family="sans-serif" font-size="2.8" text-anchor="middle" fill="black">9000 кВА</text>
    <text x="192.5" y="207" font-family="sans-serif" font-size="2.8" text-anchor="middle" fill="black">874 кВт</text>
    <text x="257.5" y="207" font-family="sans-serif" font-size="2.8" text-anchor="middle" fill="black">437 кВт</text>
    <text x="317.5" y="207" font-family="sans-serif" font-size="2.8" text-anchor="middle" fill="black">437 кВт</text>

    <!-- Row 4: Защита -->
    <text x="65" y="213" font-family="sans-serif" font-size="2.8" text-anchor="middle" fill="black">Защита</text>
    <text x="127.5" y="213" font-family="sans-serif" font-size="2.8" text-anchor="middle" fill="black">QF 630А</text>
    <text x="192.5" y="213" font-family="sans-serif" font-size="2.8" text-anchor="middle" fill="black">QF 400А + ОПН</text>
    <text x="257.5" y="213" font-family="sans-serif" font-size="2.8" text-anchor="middle" fill="black">—</text>
    <text x="317.5" y="213" font-family="sans-serif" font-size="2.8" text-anchor="middle" fill="black">—</text>
  </g>
</svg>
