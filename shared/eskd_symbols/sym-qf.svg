<?xml version="1.0" encoding="UTF-8"?>
<!-- Автоматический выключатель / Circuit breaker (ГОСТ 2.755-87)
     Наклонный контакт (замкнутое положение, ~22 от вертикали)
     + прямоугольник (механизм автоматического расцепления) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 10 14" width="10mm" height="14mm">
  <g id="symbol" data-cx="5" data-top-y="0" data-bottom-y="14">
    <!-- Upper fixed contact (dot) -->
    <circle cx="5" cy="1" r="0.8" fill="black" stroke="none"/>
    <!-- Moving contact line (closed, tilted ~22 deg from vertical) -->
    <line x1="5" y1="11" x2="3" y2="1" stroke="black" stroke-width="0.7"/>
    <!-- Auto-trip mechanism (small rectangle on contact arm) -->
    <rect x="3" y="5" width="3" height="2" fill="none" stroke="black" stroke-width="0.5"/>
    <!-- Lower hinge contact (dot) -->
    <circle cx="5" cy="11" r="0.8" fill="black" stroke="none"/>
    <!-- Connection stubs -->
    <line x1="5" y1="0" x2="5" y2="1" stroke="black" stroke-width="0.5"/>
    <line x1="5" y1="11" x2="5" y2="14" stroke="black" stroke-width="0.5"/>
  </g>
</svg>
